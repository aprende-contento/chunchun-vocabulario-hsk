body::before{content:'';position:fixed;inset:0;background:rgba(255,255,255,0.22);z-index:0;pointer-events:none;}

/* ── HEADER ── */
header{position:relative;z-index:10;background:rgba(255,255,255,0.62);backdrop-filter:blur(12px);border-bottom:1px solid rgba(100,180,160,0.25);padding:0.7rem 1.2rem 0;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;}
.title-zh{font-size:1.4rem;font-weight:700;color:#1a5c50;font-family:'Ma Shan Zheng',serif;}
.logo-img{height:52px;width:auto;border-radius:6px;}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;}
.score-bar{display:flex;gap:0.8rem;background:rgba(255,255,255,0.6);border-radius:99px;padding:0.3rem 1rem;flex:1;}
.score-item{display:flex;flex-direction:column;align-items:center;min-width:52px;}
.score-label{font-size:0.6rem;color:#5a8a80;text-transform:uppercase;letter-spacing:0.08em;}
.score-val{font-size:1.1rem;font-weight:700;color:#1a5c50;}

/* 三个图标按钮组，margin-right往左移 */
.tool-group{display:flex;align-items:flex-end;gap:0.6rem;margin-right:1.8rem;}
.tool-btn{
  width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(42,154,128,0.3);
  cursor:pointer;font-size:1.1rem;
  background:#fff;color:#2a7a6a;
  box-shadow:0 2px 6px rgba(42,120,100,0.12);
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.tool-btn:hover{background:rgba(42,154,128,0.1);border-color:#2a9a80;}
.tool-btn.active{background:#fff;border-color:#2a9a80;}
/* 声音按钮：白色底 */
#sound-btn{background:#fff;}
/* 计时器：白色底 */
#timer-btn{background:#fff;}
/* 错题本：绿色底 */
.tool-btn-nb-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
.tool-btn-nb{
  width:40px;height:40px;border-radius:50%;border:none;
  cursor:pointer;font-size:1.1rem;
  background:#2a9a80;color:#fff;
  box-shadow:0 2px 8px rgba(42,154,128,0.3);
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.tool-btn-nb:hover{background:#1a7a60;}
.tool-btn-nb-label{font-size:0.58rem;font-weight:700;color:#1a7a60;letter-spacing:0.04em;text-transform:uppercase;}

/* ── MODE TABS ── */
.mode-tabs{display:flex;gap:0.4rem;flex-wrap:wrap;padding-bottom:0.5rem;}
.mode-btn{padding:0.35rem 0.9rem;border-radius:99px;border:1.5px solid rgba(42,122,100,0.3);background:rgba(255,255,255,0.5);color:#2a7a6a;font-size:0.82rem;cursor:pointer;transition:all .2s;}
.mode-btn.active{background:#2a9a80;color:#fff;border-color:#2a9a80;font-weight:700;}

/* ── PROGRESS / TIMER ── */
.progress-wrap{height:3px;background:rgba(42,154,128,0.15);position:relative;z-index:5;}
.progress-bar{height:100%;background:linear-gradient(90deg,#56c9a8,#2a9a80);transition:width .4s;}
.timer-wrap{height:4px;background:rgba(42,154,128,0.1);display:none;}
.timer-wrap.visible{display:block;}
.timer-bar{height:100%;background:#2a9a80;transition:width .1s linear;}
.timer-bar.warning{background:#e8a830;}.timer-bar.danger{background:#e05050;}
.timer-num{text-align:right;padding-right:1rem;font-size:0.75rem;font-weight:700;color:#2a9a80;display:none;}
.timer-num.visible{display:block;}.timer-num.warning{color:#e8a830;}.timer-num.danger{color:#e05050;}

/* ── GAME AREA ── */
#game-area{position:relative;z-index:5;max-width:780px;width:100%;margin:1.5rem auto;padding:0 1rem;flex:1;}

/* ── CARD ── */
.card{background:rgba(255,255,255,0.90);border-radius:18px;border:1px solid rgba(42,154,128,0.2);box-shadow:0 8px 32px rgba(42,120,100,0.12);padding:1.6rem 1.8rem;animation:slideUp .3s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card.shake{animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
.q-label{font-size:0.78rem;font-weight:700;letter-spacing:0.1em;color:#2a9a80;text-transform:uppercase;margin-bottom:1rem;}

/* ── 拼音+汉字 div叠加 ── */
.pyhz-block{display:inline-flex;flex-direction:column;align-items:center;line-height:1;}
.pyhz-py{font-family:'Noto Sans SC',sans-serif;color:#2a9a80;font-weight:400;white-space:nowrap;}
.pyhz-hz{font-family:'Ma Shan Zheng',serif;color:#1a5c50;line-height:1;}
.main-word{display:flex;justify-content:center;gap:4px;margin:0.8rem 0 1rem;}
.main-word .pyhz-py{font-size:1rem;margin-bottom:2px;}
.main-word .pyhz-hz{font-size:3rem;}
.es-big{text-align:center;font-size:1.55rem;font-weight:600;color:#1a5c50;margin:0.4rem 0 1.2rem;line-height:1.3;}
.py-main{text-align:center;margin:0.6rem 0 1rem;}
.py-main-py{font-size:2rem;font-weight:700;color:#1a5c50;font-family:'Noto Sans SC',sans-serif;letter-spacing:0.03em;}
.py-main-hz{font-size:1.5rem;color:#2a9a80;font-family:'Ma Shan Zheng',serif;margin-top:0.15rem;}

/* ── OPTIONS ── */
.options{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin:0.5rem 0;}
.opt-btn{padding:0.9rem 0.6rem;border-radius:12px;border:1.5px solid rgba(42,154,128,0.2);background:rgba(240,252,248,0.95);color:#1a5c50;cursor:pointer;transition:all .18s;text-align:center;}
.opt-btn:hover:not(:disabled){background:rgba(42,154,128,0.12);border-color:#2a9a80;transform:translateY(-1px);}
.opt-btn.correct{background:#d4f5e8;border-color:#2a9a80;font-weight:700;}
.opt-btn.wrong{background:#fde8e8;border-color:#e05050;color:#c03030;}
.opt-btn:disabled{cursor:default;}
.opt-pyhz-wrap{display:flex;justify-content:center;gap:2px;}
.opt-pyhz-wrap .pyhz-py{font-size:0.68rem;margin-bottom:1px;}
.opt-pyhz-wrap .pyhz-hz{font-size:1.5rem;}
.opt-es-text{font-size:0.92rem;font-family:'Noto Sans SC',sans-serif;line-height:1.4;}

/* ── FEEDBACK / NEXT ── */
.feedback{min-height:1.6rem;text-align:center;font-size:0.92rem;margin:0.5rem 0;border-radius:8px;padding:0.3rem 0.5rem;}
.feedback.correct{color:#1a7a50;background:rgba(42,154,128,0.1);font-weight:700;}
.feedback.wrong{color:#c03030;background:rgba(224,80,80,0.08);}
.next-btn{visibility:hidden;width:100%;padding:0.75rem;border-radius:12px;background:#2a9a80;color:#fff;font-size:1rem;font-weight:700;border:none;cursor:pointer;margin-top:0.8rem;transition:background .2s;}
.next-btn.show{visibility:visible;}.next-btn:hover{background:#1a7a60;}

/* ── SENTENCE BUILDER ── */
.sb-prompt{font-size:1.05rem;color:#1a5c50;font-weight:600;text-align:center;margin-bottom:0.8rem;line-height:1.5;}
.sb-drop-zone{min-height:56px;border:2px dashed rgba(42,154,128,0.35);border-radius:12px;padding:0.6rem;display:flex;flex-wrap:wrap;gap:0.4rem;align-items:center;margin-bottom:0.5rem;background:rgba(240,252,248,0.6);}
.sb-hint{font-size:0.72rem;color:#7abaB8;text-align:center;margin-bottom:0.5rem;}
.word-bank{display:flex;flex-wrap:wrap;gap:0.4rem;justify-content:center;margin-bottom:0.8rem;}
.chip{padding:0.35rem 0.75rem;border-radius:99px;cursor:pointer;font-family:'Ma Shan Zheng',serif;font-size:1.05rem;transition:all .15s;user-select:none;}
.chip.bank{background:rgba(42,154,128,0.12);border:1.5px solid rgba(42,154,128,0.3);color:#1a5c50;}
.chip.bank:hover{background:rgba(42,154,128,0.22);transform:translateY(-1px);}
.chip.placed{background:rgba(42,154,128,0.18);border:1.5px solid #2a9a80;color:#1a5c50;}
.chip.correct-chip{background:#d4f5e8;border-color:#2a9a80;}
.chip.wrong-chip{background:#fde8e8;border-color:#e05050;color:#c03030;}
.btn-row{display:flex;gap:0.6rem;margin-bottom:0.5rem;}
.action-btn{flex:1;padding:0.6rem;border-radius:10px;border:none;cursor:pointer;font-size:0.88rem;font-weight:700;transition:all .18s;}
.btn-clear{background:rgba(224,80,80,0.1);color:#c03030;}.btn-check{background:rgba(42,154,128,0.15);color:#1a7a60;}

/* ── RESULTS ── */
#results{text-align:center;padding:2rem 1rem;}
.results-title{font-size:2rem;font-family:'Ma Shan Zheng',serif;color:#1a5c50;margin-bottom:0.5rem;}
.results-score{font-size:4rem;font-weight:700;color:#2a9a80;}
.results-label{color:#5a8a7a;margin-bottom:0.5rem;}
.results-grade{font-size:1.2rem;font-weight:700;margin:0.5rem 0;}
.restart-btn,.nb-open-btn{padding:0.65rem 1.6rem;border-radius:99px;border:none;cursor:pointer;font-size:0.95rem;font-weight:700;margin:0.3rem;transition:all .2s;}
.restart-btn{background:#2a9a80;color:#fff;}.nb-open-btn{background:rgba(42,154,128,0.15);color:#1a7a60;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:18px;width:min(520px,94vw);max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;border-bottom:1px solid #e8f5f0;}
.modal-title{font-weight:700;color:#1a5c50;font-size:1rem;}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;background:rgba(42,154,128,0.1);color:#2a9a80;font-size:1rem;}
.modal-body{overflow-y:auto;padding:0.8rem 1.2rem;flex:1;}
.notebook-empty{text-align:center;color:#7abaB8;padding:2rem;}
.notebook-item{display:grid;grid-template-columns:100px 1fr;gap:0.5rem;padding:0.7rem 0;border-bottom:1px solid #e8f5f0;align-items:start;}
.nb-hz{font-family:'Ma Shan Zheng',serif;font-size:1.4rem;color:#1a5c50;}
.nb-py{font-size:0.72rem;color:#5a8a7a;}
.nb-es{color:#3a7a68;font-size:0.88rem;margin-top:2px;}
.modal-footer{display:flex;align-items:center;justify-content:space-between;padding:0.7rem 1.2rem;border-top:1px solid #e8f5f0;}
.nb-count{font-size:0.82rem;color:#5a8a7a;}
.nb-clear-btn{padding:0.35rem 0.9rem;border-radius:99px;border:none;cursor:pointer;background:rgba(224,80,80,0.1);color:#c03030;font-size:0.8rem;}

/* ── FOOTER CARD ── */
footer{position:relative;z-index:5;padding:0.8rem 1rem;margin-top:auto;}
.footer-card{
  max-width:500px;margin:0 auto;
  background:rgba(255,255,255,0.72);backdrop-filter:blur(16px);
  border-radius:12px;border:1px solid rgba(42,154,128,0.15);
  box-shadow:0 4px 20px rgba(42,120,100,0.08);
  padding:0.45rem 0.8rem;
  display:flex;align-items:center;justify-content:space-between;gap:0.6rem;
}
.footer-contact{display:flex;flex-direction:column;gap:0.2rem;}
.footer-whatsapp{display:flex;align-items:center;gap:0.3rem;font-size:0.82rem;font-weight:700;color:#25D366;letter-spacing:0.04em;}
.footer-whatsapp svg{width:16px;height:16px;}
.footer-brand{font-size:0.62rem;color:rgba(42,92,80,0.6);letter-spacing:0.06em;}
.footer-qr{height:56px;width:56px;border-radius:5px;object-fit:contain;background:#fff;border:1px solid rgba(42,154,128,0.15);}

/* ── PARTICLES ── */
.particle{position:fixed;pointer-events:none;font-size:1.2rem;z-index:200;animation:floatUp .8s ease forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-70px) scale(1.3)}}
</style>
</head>

  { words:['她', '是', '班上', '最', '高', '的', '学生'], es:"Ella es la alumna más alta de la clase.", pinyin:"Tā shì bān shàng zuì gāo de xuésheng.", note:"最 = el más (superlativo)" },
  { words:['请', '再', '说', '一', '次'], es:"Por favor dilo otra vez.", pinyin:"Qǐng zài shuō yí cì.", note:"再 = otra vez / de nuevo" },
  { words:['我', '家', '有', '八', '口', '人'], es:"En mi familia somos ocho personas.", pinyin:"Wǒ jiā yǒu bā kǒu rén.", note:"八 = ocho (8)" },
  { words:['这', '本', '书', '卖', '一', '百', '块', '钱'], es:"Este libro cuesta cien yuanes.", pinyin:"Zhè běn shū mài yì bǎi kuài qián.", note:"百 = cien (100)" },
  { words:['他', '是', '第', '一', '名'], es:"Él es el primero.", pinyin:"Tā shì dì yī míng.", note:"第一 = primero" },
  { words:['我', '九', '点', '到', '学校'], es:"Llego al colegio a las nueve.", pinyin:"Wǒ jiǔ diǎn dào xuéxiào.", note:"九 = nueve (9)" },
  { words:['我', '每周', '学', '六', '天', '汉语'], es:"Estudio chino seis días a la semana.", pinyin:"Wǒ měi zhōu xué liù tiān hànyǔ.", note:"六 = seis (6)" },
  { words:['我', '有', '两', '个', '中国', '朋友'], es:"Tengo dos amigos chinos.", pinyin:"Wǒ yǒu liǎng ge zhōngguó péngyou.", note:"两 = dos (con clasificador)" },
  { words:['今天', '零', '度', '，', '很', '冷'], es:"Hoy hay cero grados, hace mucho frío.", pinyin:"Jīntiān líng dù, hěn lěng.", note:"零 = cero (0)" },
  { words:['这', '件', '衣服', '卖', '一', '千', '块'], es:"Esta ropa cuesta mil yuanes.", pinyin:"Zhè jiàn yīfu mài yì qiān kuài.", note:"千 = mil (1000)" },
  { words:['我', '七', '点', '起床'], es:"Me levanto a las siete.", pinyin:"Wǒ qī diǎn qǐchuáng.", note:"七 = siete (7)" },
  { words:['我们', '班', '有', '十', '个', '学生'], es:"En nuestra clase hay diez alumnos.", pinyin:"Wǒmen bān yǒu shí ge xuésheng.", note:"十 = diez (10)" },
  { words:['他', '有', '四', '个', '孩子'], es:"Tiene cuatro hijos.", pinyin:"Tā yǒu sì ge háizi.", note:"四 = cuatro (4)" },
  { words:['我', '学', '了', '三', '年', '汉语'], es:"Llevo tres años estudiando chino.", pinyin:"Wǒ xué le sān nián hànyǔ.", note:"三 = tres (3)" },
  { words:['我', '每天', '喝', '五', '杯', '水'], es:"Bebo cinco vasos de agua cada día.", pinyin:"Wǒ měitiān hē wǔ bēi shuǐ.", note:"五 = cinco (5)" }
];

function pyHz(hanzi, pinyin, pySize, hzSize) {
  return `<div class="pyhz-block">
    <div class="pyhz-py" style="font-size:${pySize}">${pinyin}</div>
    <div class="pyhz-hz" style="font-size:${hzSize}">${hanzi}</div>
  </div>`;
}

let mode="zh_es", questions=[], current=0, score=0, streak=0, answered=false;
let soundOn=true, timerMode=false, timerIv=null, timeLeft=15;
const TOTAL=25, SB_TOTAL=sentences.length, TIME_MAX=15;
let sbSentence=null, sbPlaced=[], sbBank=[], sbChecked=false;
let wrongItems=JSON.parse(sessionStorage.getItem("wItems_gcc_hsk2_10")||"[]");

const AC=window.AudioContext||window.webkitAudioContext; let ac;
function getAC(){if(!ac)ac=new AC();return ac;}
function playTone(type){
  if(!soundOn)return;
  try{
    const a=getAC(),t=a.currentTime,g=a.createGain(),o=a.createOscillator();
    g.connect(a.destination);o.connect(g);
    if(type==="correct"){o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(659,t+0.1);o.frequency.setValueAtTime(784,t+0.2);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);o.start(t);o.stop(t+0.5);}
    else if(type==="streak"){[523,659,784,1047].forEach((f,i)=>{const o2=a.createOscillator(),g2=a.createGain();o2.connect(g2);g2.connect(a.destination);o2.frequency.value=f;g2.gain.setValueAtTime(0.18,t+i*0.1);g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.3);o2.start(t+i*0.1);o2.stop(t+i*0.1+0.3);});}
    else if(type==="wrong"){o.type="sawtooth";o.frequency.setValueAtTime(220,t);o.frequency.setValueAtTime(180,t+0.15);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.start(t);o.stop(t+0.4);}
    else if(type==="timeout"){o.type="triangle";o.frequency.setValueAtTime(300,t);o.frequency.linearRampToValueAtTime(100,t+0.5);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);o.start(t);o.stop(t+0.5);}
    else if(type==="click"){o.frequency.value=440;g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.start(t);o.stop(t+0.1);}
    else if(type==="finish"){[523,659,784,659,784,1047].forEach((f,i)=>{const o2=a.createOscillator(),g2=a.createGain();o2.connect(g2);g2.connect(a.destination);o2.frequency.value=f;g2.gain.setValueAtTime(0.15,t+i*0.12);g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.2);o2.start(t+i*0.12);o2.stop(t+i*0.12+0.25);});}
  }catch(e){}
}

function toggleSound(){soundOn=!soundOn;const b=document.getElementById("sound-btn");b.textContent=soundOn?"🔊":"🔇";b.classList.toggle("active",soundOn);}
function toggleTimer(){timerMode=!timerMode;document.getElementById("timer-btn").classList.toggle("active",timerMode);const show=timerMode&&mode!=="sentence";document.getElementById("timer-wrap").classList.toggle("visible",show);document.getElementById("timer-num").classList.toggle("visible",show);startGame();}
function setMode(m,el){mode=m;document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));el.classList.add("active");const show=timerMode&&mode!=="sentence";document.getElementById("timer-wrap").classList.toggle("visible",show);document.getElementById("timer-num").classList.toggle("visible",show);startGame();}
function shuffle(arr){return[...arr].sort(()=>Math.random()-0.5);}
function startGame(){score=0;streak=0;current=0;answered=false;stopTimer();questions=mode==="sentence"?shuffle(sentences):shuffle(vocab).slice(0,TOTAL);document.getElementById("results").style.display="none";updateScoreBar();loadQuestion();}
function updateScoreBar(){const total=mode==="sentence"?SB_TOTAL:TOTAL;document.getElementById("score-val").textContent=score;document.getElementById("streak-val").textContent="🔥 "+streak;document.getElementById("q-val").textContent=(current+1)+"/"+total;document.getElementById("progress-bar").style.width=(current/total*100)+"%";}
function loadQuestion(){answered=false;document.getElementById("quiz-card").style.display="none";document.getElementById("sb-card").style.display="none";if(mode==="sentence")loadSentenceQ();else loadQuizQ();updateScoreBar();}

function loadQuizQ(){
  const q=questions[current];
  const area=document.getElementById("q-main-area");
  const grid=document.getElementById("options-grid");
  document.getElementById("feedback").textContent="";
  document.getElementById("feedback").className="feedback";
  document.getElementById("quiz-next").className="next-btn";
  grid.innerHTML="";

  if(mode==="zh_es"){
    document.getElementById("q-label").textContent="Elige la traducción al español · 选择西班牙文翻译";
    area.innerHTML=`<div class="main-word">${pyHz(q.hanzi,q.pinyin,'1rem','3rem')}</div>`;
    const correct=q.es;
    shuffle([correct,...shuffle(vocab.filter(v=>v!==q).map(v=>v.es)).slice(0,3)]).forEach(opt=>{
      const b=document.createElement("button");b.className="opt-btn";
      b.innerHTML=`<span class="opt-es-text">${opt}</span>`;b.dataset.val=opt;
      b.onclick=()=>checkAnswer(b,correct,q);grid.appendChild(b);
    });
  }
  else if(mode==="es_zh"){
    document.getElementById("q-label").textContent="Elige el carácter chino correcto · 选择正确的汉字";
    area.innerHTML=`<div class="es-big">${q.es}</div>`;
    const correct=q.hanzi;
    shuffle([correct,...shuffle(vocab.filter(v=>v!==q).map(v=>v.hanzi)).slice(0,3)]).forEach(opt=>{
      const v=vocab.find(x=>x.hanzi===opt)||{pinyin:""};
      const b=document.createElement("button");b.className="opt-btn";
      b.innerHTML=`<div class="opt-pyhz-wrap">${pyHz(opt,v.pinyin,'0.68rem','1.5rem')}</div>`;
      b.dataset.val=opt;b.onclick=()=>checkAnswer(b,correct,q);grid.appendChild(b);
    });
  }
  else if(mode==="pinyin_es"){
    document.getElementById("q-label").textContent="Elige la traducción al español · 根据汉字选择";
    area.innerHTML=`<div class="py-main"><div class="py-main-hz" style="font-size:3rem;">${q.hanzi}</div></div>`;
    const correct=q.es;
    shuffle([correct,...shuffle(vocab.filter(v=>v!==q).map(v=>v.es)).slice(0,3)]).forEach(opt=>{
      const b=document.createElement("button");b.className="opt-btn";
      b.innerHTML=`<span class="opt-es-text">${opt}</span>`;b.dataset.val=opt;
      b.onclick=()=>checkAnswer(b,correct,q);grid.appendChild(b);
    });
  }

  const card=document.getElementById("quiz-card");card.style.display="block";card.style.animation="none";card.offsetHeight;card.style.animation="";
  if(timerMode)startTimer();
}

function checkAnswer(btn,correct,q){
  if(answered)return;answered=true;stopTimer();
  const chosen=btn.dataset.val;
  document.querySelectorAll(".opt-btn").forEach(b=>{b.disabled=true;if(b.dataset.val===correct)b.classList.add("correct");});
  const fb=document.getElementById("feedback");
  if(chosen===correct){
    btn.classList.add("correct");const bonus=timerMode?Math.ceil(timeLeft/TIME_MAX*5):0;score+=10+streak*2+bonus;streak++;
    if(streak>=3){playTone("streak");spawnParticles(btn,["🔥","⭐","💥"]);}else{playTone("correct");spawnParticles(btn,["✨","⭐","🎉"]);}
    fb.textContent=streak>2?"🔥 Racha x"+streak+"！"+(bonus?"+"+bonus+" pts":"")+" ¡Excelente!":"✓ ¡Correcto!";fb.className="feedback correct";
  }else{
    btn.classList.add("wrong");playTone("wrong");streak=0;
    fb.innerHTML="✗ Respuesta: <strong>"+correct+"</strong>";fb.className="feedback wrong";
    document.getElementById("quiz-card").classList.add("shake");setTimeout(()=>document.getElementById("quiz-card").classList.remove("shake"),400);
    addToNotebook(q);
  }
  document.getElementById("score-val").textContent=score;document.getElementById("streak-val").textContent="🔥 "+streak;
  document.getElementById("quiz-next").className="next-btn show";
}

function loadSentenceQ(){
  sbSentence=questions[current];sbPlaced=[];sbBank=shuffle([...sbSentence.words]);sbChecked=false;
  document.getElementById("sb-prompt").innerHTML="<strong>"+sbSentence.es+"</strong>"+(sbSentence.note?"<br><small style='color:#5a9a80;font-size:0.75rem'>词汇："+sbSentence.note+"</small>":"");
  document.getElementById("sb-feedback").textContent="";document.getElementById("sb-feedback").className="feedback";
  document.getElementById("sb-next").className="next-btn";document.getElementById("sb-check-btn").disabled=false;
  renderDropZone();renderWordBank();
  const card=document.getElementById("sb-card");card.style.display="block";card.style.animation="none";card.offsetHeight;card.style.animation="";
}
function renderDropZone(){const dz=document.getElementById("sb-drop");dz.innerHTML="";if(sbPlaced.length===0){dz.innerHTML="<span style='color:#7abaB8;font-size:0.82rem;'>Coloca las palabras aquí · 把词语放到这里</span>";return;}sbPlaced.forEach((w,i)=>{const c=document.createElement("span");c.className="chip placed";c.textContent=w;c.onclick=(e)=>{e.stopPropagation();returnChip(i);};dz.appendChild(c);});}
function renderWordBank(){const bank=document.getElementById("sb-bank");bank.innerHTML="";sbBank.forEach((w,i)=>{const c=document.createElement("span");c.className="chip bank";c.textContent=w;c.onclick=()=>placeChip(i);bank.appendChild(c);});}
function placeChip(i){if(sbChecked)return;playTone("click");sbPlaced.push(sbBank[i]);sbBank.splice(i,1);renderDropZone();renderWordBank();}
function returnChip(i){if(sbChecked)return;playTone("click");sbBank.push(sbPlaced[i]);sbPlaced.splice(i,1);renderDropZone();renderWordBank();}
function clearSentence(){if(sbChecked)return;sbBank=shuffle([...sbSentence.words]);sbPlaced=[];renderDropZone();renderWordBank();}
function checkSentence(){
  if(sbChecked)return;
  if(sbPlaced.length===0){document.getElementById("sb-feedback").textContent="¡Coloca las palabras primero!";document.getElementById("sb-feedback").className="feedback wrong";return;}
  sbChecked=true;document.getElementById("sb-check-btn").disabled=true;
  const correct=sbSentence.words;
  const isOK=sbPlaced.length===correct.length&&sbPlaced.every((w,i)=>w===correct[i]);
  document.getElementById("sb-drop").querySelectorAll(".chip").forEach((chip,i)=>{chip.onclick=null;chip.classList.add(i<correct.length&&chip.textContent===correct[i]?"correct-chip":"wrong-chip");});
  const fb=document.getElementById("sb-feedback");
  if(isOK){
    score+=15+streak*2;streak++;
    if(streak>=3){playTone("streak");spawnParticles(document.getElementById("sb-drop"),["🔥","⭐","💥"]);}else{playTone("correct");spawnParticles(document.getElementById("sb-drop"),["✨","📝","🎉"]);}
    fb.innerHTML=(streak>2?"🔥 Racha x"+streak+"！¡Increíble!":"✓ ¡Muy bien!")+(sbSentence.pinyin?"<br><small style='opacity:0.8;'>"+sbSentence.pinyin+"</small>":"");
    fb.className="feedback correct";
  }else{
    playTone("wrong");streak=0;
    fb.innerHTML="✗ Orden correcto: <small style='color:#e07070;'>"+sbSentence.pinyin+"</small><br><strong>"+correct.join(" ")+"</strong>";
    fb.className="feedback wrong";
    document.getElementById("sb-card").classList.add("shake");setTimeout(()=>document.getElementById("sb-card").classList.remove("shake"),400);
    addToNotebook({hanzi:sbSentence.words.join(""),pinyin:"句子",es:sbSentence.es});
  }
  document.getElementById("score-val").textContent=score;document.getElementById("streak-val").textContent="🔥 "+streak;
  document.getElementById("sb-next").className="next-btn show";
}

function nextQuestion(){const total=mode==="sentence"?SB_TOTAL:TOTAL;current++;if(current>=total)showResults();else loadQuestion();}
function showResults(){
  playTone("finish");stopTimer();
  document.getElementById("quiz-card").style.display="none";document.getElementById("sb-card").style.display="none";
  document.getElementById("results").style.display="block";document.getElementById("final-score").textContent=score;
  document.getElementById("progress-bar").style.width="100%";
  const pct=score/((mode==="sentence"?SB_TOTAL*17:TOTAL*12));
  let grade,color;
  if(pct>=0.88){grade="🏆 优秀 ¡Excelente!";color="#1a5c50";}else if(pct>=0.65){grade="🌟 良好 ¡Muy bien!";color="#2a7a60";}else if(pct>=0.45){grade="👍 合格 ¡Bien!";color="#4a9a80";}else{grade="📚 加油 ¡Sigue practicando!";color="#c05050";}
  const el=document.getElementById("final-grade");el.textContent=grade;el.style.color=color;
}
function startTimer(){timeLeft=TIME_MAX;updateTimerUI();timerIv=setInterval(()=>{timeLeft-=0.1;updateTimerUI();if(timeLeft<=0){clearInterval(timerIv);onTimeout();}},100);}
function stopTimer(){clearInterval(timerIv);timerIv=null;}
function updateTimerUI(){const pct=timeLeft/TIME_MAX,bar=document.getElementById("timer-bar"),num=document.getElementById("timer-num");bar.style.width=(pct*100)+"%";num.textContent=Math.ceil(timeLeft)+"s";const cls=pct>0.5?"":pct>0.25?"warning":"danger";bar.className="timer-bar"+(cls?" "+cls:"");num.className="timer-num visible"+(cls?" "+cls:"");}
function onTimeout(){if(answered)return;answered=true;playTone("timeout");streak=0;document.getElementById("streak-val").textContent="🔥 0";document.querySelectorAll(".opt-btn").forEach(b=>b.disabled=true);const q=questions[current];document.getElementById("feedback").innerHTML="⏰ Tiempo: <strong>"+q.es+"</strong>";document.getElementById("feedback").className="feedback wrong";document.getElementById("quiz-next").className="next-btn show";addToNotebook(q);}
function addToNotebook(q){if(!wrongItems.some(w=>w.hanzi===q.hanzi)){wrongItems.push(q);sessionStorage.setItem("wItems_gcc_hsk2_10",JSON.stringify(wrongItems));}}
function openNotebook(){const body=document.getElementById("nb-body");if(wrongItems.length===0){body.innerHTML="<div class='notebook-empty'>🎉 ¡Sin errores! 没有错题</div>";}else{body.innerHTML=wrongItems.map(w=>`<div class='notebook-item'><div><div class='nb-hz'>${w.hanzi}</div><div class='nb-py'>${w.pinyin||""}</div></div><div><div style='font-size:0.65rem;color:#9abab0;'>Español</div><div class='nb-es'>${w.es}</div></div></div>`).join("");}document.getElementById("nb-count").textContent=wrongItems.length+" errores";document.getElementById("modal-overlay").classList.add("open");}
function closeNotebook(){document.getElementById("modal-overlay").classList.remove("open");}
function modalOutsideClick(e){if(e.target===document.getElementById("modal-overlay"))closeNotebook();}
function clearNotebook(){wrongItems=[];sessionStorage.removeItem("wItems_gcc_hsk2_10");openNotebook();}
function spawnParticles(el,emojis){const rect=el.getBoundingClientRect();for(let i=0;i<6;i++){const p=document.createElement("div");p.className="particle";p.textContent=emojis[Math.floor(Math.random()*emojis.length)];p.style.left=(rect.left+rect.width/2+(Math.random()-0.5)*80)+"px";p.style.top=(rect.top+rect.height/2)+"px";p.style.animationDelay=(i*0.07)+"s";document.body.appendChild(p);setTimeout(()=>p.remove(),1400);}}
startGame();
</script>
</body>
