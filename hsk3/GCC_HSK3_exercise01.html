    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background: rgba(255,255,255,0.08);
    pointer-events: none; z-index: 0;
  }

  /* ── Header ── */
  header {
    width: 100%; text-align: center;
    padding: 1.2rem 1rem 0.5rem;
    position: relative; z-index: 1;
  }

  .header-top {
    display: flex; align-items: center; justify-content: center; gap: 1.2rem;
  }

  .logo-img {
    height: 56px; width: auto; max-width: 180px;
    border-radius: 8px;
    
    
    
    flex-shrink: 0;
    object-fit: contain;
  }

  .title-block { text-align: center; }

  .title-zh {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(1.8rem, 4.5vw, 2.8rem);
    color: white;
    letter-spacing: 0.15em;
    text-shadow: 0 2px 12px rgba(13,53,53,0.25);
    line-height: 1.1;
  }
  .title-sub {
    font-family: 'Playfair Display', serif;
    font-size: 0.75rem; color: rgba(255,255,255,0.7);
    letter-spacing: 0.35em; text-transform: uppercase; margin-top: 0.1rem;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; align-items: center; justify-content: center;
    gap: 0.5rem; margin: 0.7rem 0 0.3rem; flex-wrap: wrap; z-index: 1; position: relative;
  }

  .score-bar {
    display: flex; gap: 1.3rem; align-items: center;
    padding: 0.45rem 1.4rem;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 2rem; backdrop-filter: blur(10px);
  }
  .score-item { display: flex; flex-direction: column; align-items: center; }
  .score-label { font-size: 0.58rem; color: rgba(255,255,255,0.75); text-transform: uppercase; letter-spacing: 0.1em; }
  .score-val { font-size: 1.25rem; font-weight: 700; color: white; }
  #streak-val { color: #ffe066; }

  .icon-btn {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.2); color: white;
    font-size: 1rem; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  .icon-btn:hover { background: rgba(255,255,255,0.35); }
  .icon-btn.active {  color: var(--tiffany-dark); border-color: white; }

  /* ── Mode tabs ── */
  .mode-tabs {
    display: flex; gap: 0.4rem; justify-content: center; flex-wrap: wrap;
    margin-bottom: 0.5rem; z-index: 1; position: relative;
  }
  .mode-btn {
    padding: 0.4rem 1.1rem;
    border: 1px solid rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85);
    font-family: 'Noto Sans SC', sans-serif; font-size: 0.78rem;
    cursor: pointer; border-radius: 2rem; transition: all 0.3s;
    backdrop-filter: blur(6px);
  }
  .mode-btn.active {  color: var(--tiffany-dark); border-color: white; font-weight: 700; }

  /* ── Game area ── */
  #game-area {
    width: min(700px, 95vw);
    position: relative; z-index: 1; margin-top: 0.3rem;
  }

  .progress-wrap {
    height: 4px; background: rgba(255,255,255,0.25);
    border-radius: 2px; margin-bottom: 0.8rem; overflow: hidden;
  }
  .progress-bar {
    height: 100%; 
    border-radius: 2px; transition: width 0.5s ease;
    box-shadow: 0 0 8px rgba(255,255,255,0.6);
  }

  /* Timer */
  .timer-num {
    text-align: right; font-size: 0.78rem; font-weight: 700;
    color: white; margin-bottom: 0.3rem; display: none;
  }
  .timer-num.visible { display: block; }
  .timer-num.warning { color: #ffe066; }
  .timer-num.danger  { color: #ffaaaa; animation: pulse-red 0.5s infinite; }
  .timer-wrap {
    height: 5px; background: rgba(255,255,255,0.2);
    border-radius: 3px; margin-bottom: 0.7rem; overflow: hidden; display: none;
  }
  .timer-wrap.visible { display: block; }
  .timer-bar {
    height: 100%; width: 100%;
     border-radius: 3px; transition: width 0.1s linear, background 0.3s;
  }
  .timer-bar.warning { background: #ffe066; }
  .timer-bar.danger  { background: #ffaaaa; }
  @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Card ── */
  .card {
    background: var(--paper); border-radius: 20px;
    padding: 1.7rem 2.2rem;
    box-shadow: 0 20px 60px rgba(13,53,53,0.2), 0 0 0 1px rgba(78,197,193,0.15);
    position: relative; overflow: hidden;
    animation: slideIn 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--tiffany), var(--tiffany-dark));
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(18px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)}
  }
  .card.shake { animation: shake 0.35s ease; }

  .q-label {
    font-size: 0.68rem; color: var(--sage); letter-spacing: 0.15em;
    text-transform: uppercase; margin-bottom: 0.6rem; font-weight: 700;
  }

  .question-main {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(3rem, 9vw, 5rem);
    color: var(--ink); text-align: center; line-height: 1;
    margin: 0.3rem 0 1.1rem;
  }
  .question-main.serif-style {
    font-family: 'Noto Serif SC', Georgia, serif;
    font-size: clamp(1.6rem, 5vw, 3rem);
    font-weight: 400; letter-spacing: 0.01em;
    margin-bottom: 0.8rem;
  }
  .question-sub {
    text-align: center; color: #888; font-size: 0.86rem;
    margin-bottom: 1.1rem; letter-spacing: 0.05em;
  }

  .options {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;
  }
  .opt-btn {
    padding: 0.85rem 1rem; 
    border: 2px solid #d0eded; border-radius: 12px;
    cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.9rem; color: var(--ink);
    transition: all 0.2s; text-align: center; line-height: 1.4;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--tiffany); transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(78,197,193,0.25);
  }
  .opt-btn.correct { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; font-weight: 700; }
  .opt-btn.wrong   { background: #ffebee; border-color: var(--red); color: var(--red); }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.hanzi-opt { font-family: 'Ma Shan Zheng', cursive; font-size: 1.5rem; }

  .feedback {
    text-align: center; font-size: 0.92rem; font-weight: 700;
    margin-top: 0.9rem; min-height: 1.5rem; letter-spacing: 0.05em;
  }
  .feedback.correct { color: #27ae60; }
  .feedback.wrong   { color: var(--red); }

  /* ── Sentence builder ── */
  .sb-prompt {
    font-size: 1rem; color: #446; text-align: center;
    margin-bottom: 0.8rem; line-height: 1.6; font-style: italic;
  }
  .sb-prompt strong { color: var(--ink); font-style: normal; font-weight: 700; }

  .sb-drop-zone {
    min-height: 58px; border: 2px dashed #a8e0de;
    border-radius: 12px; padding: 0.6rem 0.8rem;
    display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center;
    justify-content: center; margin-bottom: 1rem;
    background: #f0fafa; transition: border-color 0.2s;
  }

  .chip {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.5rem; padding: 0.3rem 0.75rem;
    border-radius: 10px; cursor: pointer; user-select: none;
    transition: all 0.2s; display: inline-block; line-height: 1.3;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .chip.bank {  border: 2px solid #c0e8e6; color: var(--ink); }
  .chip.bank:hover { border-color: var(--tiffany); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(78,197,193,0.25); }
  .chip.placed { background: var(--tiffany-dark); border: 2px solid var(--tiffany-dark); color: white; }
  .chip.placed:hover { background: var(--ink); }
  .chip.correct-chip { background: #e8f5e9 !important; border-color: #4caf50 !important; color: #2e7d32 !important; }
  .chip.wrong-chip   { background: #ffebee !important; border-color: var(--red) !important; color: var(--red) !important; }

  .word-bank {
    display: flex; flex-wrap: wrap; gap: 0.4rem;
    justify-content: center; min-height: 48px;
    padding: 0.5rem; margin-bottom: 0.8rem;
  }
  .sb-hint { font-size: 0.78rem; color: #aaa; text-align: center; margin-bottom: 0.5rem; }

  .btn-row { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }
  .action-btn {
    padding: 0.65rem 1.6rem; border-radius: 2rem;
    font-family: 'Noto Sans SC', sans-serif; font-size: 0.85rem;
    font-weight: 700; cursor: pointer; transition: all 0.25s;
    letter-spacing: 0.1em; border: 2px solid;
  }
  .btn-check { background: var(--tiffany-dark); color: white; border-color: var(--tiffany-dark); }
  .btn-check:hover { background: var(--ink); border-color: var(--ink); }
  .btn-clear { background: transparent; color: #aaa; border-color: #ddd; }
  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  .next-btn {
    display: block; margin: 0.9rem auto 0;
    padding: 0.65rem 2.4rem;
    background: var(--tiffany-dark); color: white;
    border: 2px solid var(--tiffany-dark); border-radius: 2rem;
    font-family: 'Noto Sans SC', sans-serif; font-size: 0.85rem;
    font-weight: 700; cursor: pointer; letter-spacing: 0.15em;
    transition: all 0.25s; opacity: 0; pointer-events: none;
  }
  .next-btn.show { opacity: 1; pointer-events: all; animation: popIn 0.3s cubic-bezier(0.22,1,0.36,1); }
  @keyframes popIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
  .next-btn:hover { background: var(--ink); border-color: var(--ink); }

  /* ── Results ── */
  #results {
    display: none; text-align: center; color: white;
    padding: 1rem; animation: slideIn 0.5s ease;
  }
  .results-title { font-family: 'Ma Shan Zheng', cursive; font-size: 3.2rem; color: white; text-shadow: 0 2px 12px rgba(13,53,53,0.2); }
  .results-score { font-size: 4.2rem; font-weight: 700; color: white; line-height: 1; }
  .results-label { color: rgba(255,255,255,0.6); font-size: 0.88rem; }
  .results-grade { font-family: 'Ma Shan Zheng', cursive; font-size: 1.9rem; margin: 0.5rem 0 1.2rem; color: white; }

  .restart-btn {
    padding: 0.75rem 2.2rem;  color: var(--tiffany-dark);
    border: none; border-radius: 2rem;
    font-family: 'Noto Sans SC', sans-serif; font-size: 0.92rem;
    font-weight: 700; cursor: pointer; margin: 0 0.3rem; transition: all 0.25s;
  }
  .restart-btn:hover { transform: scale(1.05); background: var(--tiffany-pale); }
  .nb-open-btn {
    padding: 0.75rem 1.8rem; background: transparent; color: white;
    border: 2px solid rgba(255,255,255,0.7); border-radius: 2rem;
    font-family: 'Noto Sans SC', sans-serif; font-size: 0.85rem;
    font-weight: 700; cursor: pointer; margin: 0 0.3rem; transition: all 0.25s;
  }
  .nb-open-btn:hover { background: rgba(255,255,255,0.2); }

  /* ── Notebook modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(13,53,53,0.6); z-index: 100;
    align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--paper); border-radius: 20px;
    width: min(600px, 92vw); max-height: 80vh;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 30px 80px rgba(13,53,53,0.3);
    animation: slideIn 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  .modal-header {
    padding: 1.1rem 1.4rem; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid #d0eded;
    background: linear-gradient(135deg, #edfafa, var(--paper));
  }
  .modal-title { font-family: 'Ma Shan Zheng', cursive; font-size: 1.5rem; color: var(--ink); }
  .modal-close {
    width: 30px; height: 30px; border-radius: 50%; border: none;
    background: #d0eded; color: var(--ink); font-size: 0.95rem; cursor: pointer; transition: all 0.2s;
  }
  .modal-close:hover { background: var(--red); color: white; }
  .modal-body { padding: 0.8rem 1.4rem; overflow-y: auto; flex: 1; }
  .notebook-empty { text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 1rem; }
  .notebook-item {
    display: grid; grid-template-columns: auto 1fr 1fr;
    gap: 0.4rem 0.9rem; align-items: center;
    padding: 0.7rem 0; border-bottom: 1px solid #e8f5f5; font-size: 0.85rem;
  }
  .notebook-item:last-child { border-bottom: none; }
  .nb-hanzi { font-family: 'Ma Shan Zheng', cursive; font-size: 1.7rem; color: var(--ink); }
  .nb-pinyin { color: var(--sage); font-size: 0.75rem; }
  .nb-zh { color: #555; }
  .nb-es { color: #888; font-style: italic; }
  .nb-label { font-size: 0.58rem; color: #bbb; text-transform: uppercase; letter-spacing: 0.1em; }
  .modal-footer {
    padding: 0.7rem 1.4rem; border-top: 1px solid #d0eded;
    display: flex; justify-content: space-between; align-items: center;
    background: #f0fafa;
  }
  .nb-count { font-size: 0.78rem; color: #999; }
  .nb-clear-btn {

    cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans SC', sans-serif;
  }
  .nb-clear-btn:hover { background: var(--red); color: white; }

  .particle {
    position: fixed; pointer-events: none; font-size: 1.4rem;

let mode="zh_es", questions=[], current=0, score=0, streak=0, answered=false;
let soundOn=true, timerMode=false, timerIv=null, timeLeft=15;
const TOTAL=25, SB_TOTAL=sentences.length, TIME_MAX=15;
let sbSentence=null, sbPlaced=[], sbBank=[], sbChecked=false;
let wrongItems=JSON.parse(sessionStorage.getItem("wItems_hsk3_v1")||"[]");
const AC=window.AudioContext||window.webkitAudioContext; let ac;
function getAC(){if(!ac)ac=new AC();return ac;}
function playTone(type){if(!soundOn)return;try{const a=getAC(),t=a.currentTime,g=a.createGain(),o=a.createOscillator();g.connect(a.destination);o.connect(g);if(type==="correct"){o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(659,t+0.1);o.frequency.setValueAtTime(784,t+0.2);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);o.start(t);o.stop(t+0.5);}else if(type==="streak"){[523,659,784,1047].forEach((f,i)=>{const o2=a.createOscillator(),g2=a.createGain();o2.connect(g2);g2.connect(a.destination);o2.frequency.value=f;g2.gain.setValueAtTime(0.18,t+i*0.1);g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.3);o2.start(t+i*0.1);o2.stop(t+i*0.1+0.3);});}else if(type==="wrong"){o.type="sawtooth";o.frequency.setValueAtTime(220,t);o.frequency.setValueAtTime(180,t+0.15);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.start(t);o.stop(t+0.4);}else if(type==="timeout"){o.type="triangle";o.frequency.setValueAtTime(300,t);o.frequency.linearRampToValueAtTime(100,t+0.5);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);o.start(t);o.stop(t+0.5);}else if(type==="click"){o.frequency.value=440;g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.start(t);o.stop(t+0.1);}else if(type==="finish"){[523,659,784,659,784,1047].forEach((f,i)=>{const o2=a.createOscillator(),g2=a.createGain();o2.connect(g2);g2.connect(a.destination);o2.frequency.value=f;g2.gain.setValueAtTime(0.15,t+i*0.12);g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.2);o2.start(t+i*0.12);o2.stop(t+i*0.12+0.25);});}}catch(e){}}
function toggleSound(){soundOn=!soundOn;const b=document.getElementById("sound-btn");b.textContent=soundOn?"🔊":"🔇";b.classList.toggle("active",soundOn);}
function toggleTimer(){timerMode=!timerMode;document.getElementById("timer-btn").classList.toggle("active",timerMode);const show=timerMode&&mode!=="sentence";document.getElementById("timer-wrap").classList.toggle("visible",show);document.getElementById("timer-num").classList.toggle("visible",show);startGame();}
function setMode(m,el){mode=m;document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));el.classList.add("active");const show=timerMode&&mode!=="sentence";document.getElementById("timer-wrap").classList.toggle("visible",show);document.getElementById("timer-num").classList.toggle("visible",show);startGame();}
function shuffle(arr){return[...arr].sort(()=>Math.random()-0.5);}
function startGame(){score=0;streak=0;current=0;answered=false;stopTimer();questions=mode==="sentence"?shuffle(sentences):shuffle(vocab).slice(0,TOTAL);document.getElementById("results").style.display="none";updateScoreBar();loadQuestion();}
function updateScoreBar(){const total=mode==="sentence"?SB_TOTAL:TOTAL;document.getElementById("score-val").textContent=score;document.getElementById("streak-val").textContent="🔥 "+streak;document.getElementById("q-val").textContent=(current+1)+"/"+total;document.getElementById("progress-bar").style.width=(current/total*100)+"%";}
function loadQuestion(){answered=false;document.getElementById("quiz-card").style.display="none";document.getElementById("sb-card").style.display="none";if(mode==="sentence")loadSentenceQ();else loadQuizQ();updateScoreBar();}
function getCfg(q){if(mode==="zh_es")return{label:"选择正确的西班牙文翻译 · Elige la traducción al español",main:q.hanzi,sub:"",key:"es",serifStyle:false};if(mode==="es_zh")return{label:"选择正确的汉字 · Elige el carácter chino correcto",main:q.es,sub:"",key:"hanzi",serifStyle:true};if(mode==="pinyin")return{label:"根据拼音选择汉字 · Elige el carácter para este pinyin",main:q.pinyin,sub:q.es,key:"hanzi",serifStyle:true};}
function loadQuizQ(){const q=questions[current],cfg=getCfg(q);document.getElementById("q-label").textContent=cfg.label;const qm=document.getElementById("q-main");qm.textContent=cfg.main;qm.className="question-main"+(cfg.serifStyle?" serif-style":"");document.getElementById("q-sub").textContent=cfg.sub;document.getElementById("q-sub").style.display=cfg.sub?"block":"none";document.getElementById("feedback").textContent="";document.getElementById("feedback").className="feedback";document.getElementById("quiz-next").className="next-btn";const correct=q[cfg.key];const pool=shuffle(vocab.filter(v=>v!==q).map(v=>v[cfg.key])).slice(0,3);const opts=shuffle([correct,...pool]);const grid=document.getElementById("options-grid");grid.innerHTML="";opts.forEach(opt=>{const b=document.createElement("button");b.className="opt-btn"+(cfg.key==="hanzi"?" hanzi-opt":"");b.textContent=opt;b.onclick=()=>checkQuizAnswer(b,opt,correct,q);grid.appendChild(b);});const card=document.getElementById("quiz-card");card.style.display="block";card.style.animation="none";card.offsetHeight;card.style.animation="";if(timerMode)startTimer();}
function checkQuizAnswer(btn,chosen,correct,q){if(answered)return;answered=true;stopTimer();document.querySelectorAll(".opt-btn").forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add("correct");});const fb=document.getElementById("feedback");if(chosen===correct){btn.classList.add("correct");const bonus=timerMode?Math.ceil(timeLeft/TIME_MAX*5):0;score+=10+streak*2+bonus;streak++;if(streak>=3){playTone("streak");spawnParticles(btn,["🔥","⭐","💥"]);}else{playTone("correct");spawnParticles(btn,["✨","⭐","🎉"]);}fb.textContent=streak>2?"🔥 连击 x"+streak+"！"+(bonus?"+"+bonus+" pts":"")+" ¡Excelente!":"✓ 正确！¡Correcto!";fb.className="feedback correct";}else{btn.classList.add("wrong");playTone("wrong");streak=0;const ph=(mode==="zh_es"||mode==="es_zh")?" ("+q.pinyin+")":"";fb.innerHTML="✗ 正确答案 · Respuesta: <strong>"+correct+"</strong><span style='font-weight:400'>"+ph+"</span>";fb.className="feedback wrong";document.getElementById("quiz-card").classList.add("shake");setTimeout(()=>document.getElementById("quiz-card").classList.remove("shake"),400);addToNotebook(q);}document.getElementById("score-val").textContent=score;document.getElementById("streak-val").textContent="🔥 "+streak;document.getElementById("quiz-next").className="next-btn show";}
function loadSentenceQ(){sbSentence=questions[current];sbPlaced=[];sbBank=shuffle([...sbSentence.words]);sbChecked=false;const prompt="<strong>"+sbSentence.es+"</strong>"+(sbSentence.note?"<br><small style='color:#7abaB8;font-size:0.75rem'>词汇："+sbSentence.note+"</small>":"");document.getElementById("sb-prompt").innerHTML=prompt;document.getElementById("sb-feedback").textContent="";document.getElementById("sb-feedback").className="feedback";document.getElementById("sb-next").className="next-btn";document.getElementById("sb-check-btn").disabled=false;renderDropZone();renderWordBank();const card=document.getElementById("sb-card");card.style.display="block";card.style.animation="none";card.offsetHeight;card.style.animation="";}
function renderDropZone(){const dz=document.getElementById("sb-drop");dz.innerHTML="";if(sbPlaced.length===0){dz.innerHTML="<span style='color:#acd8d6;font-size:0.82rem;'>把词语放到这里 · Coloca las palabras aquí</span>";return;}sbPlaced.forEach((w,i)=>{const c=document.createElement("span");c.className="chip placed";c.textContent=w;c.onclick=(e)=>{e.stopPropagation();returnChip(i);};dz.appendChild(c);});}
function renderWordBank(){const bank=document.getElementById("sb-bank");bank.innerHTML="";sbBank.forEach((w,i)=>{const c=document.createElement("span");c.className="chip bank";c.textContent=w;c.onclick=()=>placeChip(i);bank.appendChild(c);});}
function placeChip(i){if(sbChecked)return;playTone("click");sbPlaced.push(sbBank[i]);sbBank.splice(i,1);renderDropZone();renderWordBank();}
function returnChip(i){if(sbChecked)return;playTone("click");sbBank.push(sbPlaced[i]);sbPlaced.splice(i,1);renderDropZone();renderWordBank();}
function clearSentence(){if(sbChecked)return;sbBank=shuffle([...sbSentence.words]);sbPlaced=[];renderDropZone();renderWordBank();}
function checkSentence(){if(sbChecked)return;if(sbPlaced.length===0){document.getElementById("sb-feedback").textContent="请先排列词语！· ¡Coloca las palabras primero!";document.getElementById("sb-feedback").className="feedback wrong";return;}sbChecked=true;document.getElementById("sb-check-btn").disabled=true;const correct=sbSentence.words;const isOK=sbPlaced.length===correct.length&&sbPlaced.every((w,i)=>w===correct[i]);document.getElementById("sb-drop").querySelectorAll(".chip").forEach((chip,i)=>{chip.onclick=null;chip.classList.add(i<correct.length&&chip.textContent===correct[i]?"correct-chip":"wrong-chip");});const fb=document.getElementById("sb-feedback");if(isOK){score+=15+streak*2;streak++;if(streak>=3){playTone("streak");spawnParticles(document.getElementById("sb-drop"),["🔥","⭐","💥"]);}else{playTone("correct");spawnParticles(document.getElementById("sb-drop"),["✨","📝","🎉"]);}const sp=sbSentence.pinyin||"";fb.innerHTML=(streak>2?"🔥 连击 x"+streak+"！¡Increíble!":"✓ 正确！¡Muy bien!")+(sp?"<br><span style='font-weight:400;font-size:0.82rem;opacity:0.8;letter-spacing:0.04em'>"+sp+"</span>":"");fb.className="feedback correct";}else{playTone("wrong");streak=0;const sp=sbSentence.pinyin||"";fb.innerHTML="✗ 正确顺序 · Orden correcto:<br><span style='font-weight:400;font-size:0.82rem;color:#e07070;letter-spacing:0.04em'>"+sp+"</span><br><strong>"+correct.join(" ")+"</strong>";fb.className="feedback wrong";document.getElementById("sb-card").classList.add("shake");setTimeout(()=>document.getElementById("sb-card").classList.remove("shake"),400);addToNotebook({hanzi:sbSentence.words.join(""),pinyin:"句子",zh:sbSentence.words.join(" "),es:sbSentence.es});}document.getElementById("score-val").textContent=score;document.getElementById("streak-val").textContent="🔥 "+streak;document.getElementById("sb-next").className="next-btn show";}
function nextQuestion(){const total=mode==="sentence"?SB_TOTAL:TOTAL;current++;if(current>=total)showResults();else loadQuestion();}
function showResults(){playTone("finish");stopTimer();document.getElementById("quiz-card").style.display="none";document.getElementById("sb-card").style.display="none";document.getElementById("results").style.display="block";document.getElementById("final-score").textContent=score;document.getElementById("progress-bar").style.width="100%";const max=mode==="sentence"?SB_TOTAL*17:TOTAL*12,pct=score/max;let grade,color;if(pct>=0.88){grade="🏆 优秀 ¡Excelente!";color="#fff";}else if(pct>=0.65){grade="🌟 良好 ¡Muy bien!";color="#d6f5f4";}else if(pct>=0.45){grade="👍 合格 ¡Bien!";color="#a8e8e5";}else{grade="📚 加油 Sigue practicando~";color="#ffe0e0";}const el=document.getElementById("final-grade");el.textContent=grade;el.style.color=color;}
function startTimer(){timeLeft=TIME_MAX;updateTimerUI();timerIv=setInterval(()=>{timeLeft-=0.1;updateTimerUI();if(timeLeft<=0){clearInterval(timerIv);onTimeout();}},100);}
function stopTimer(){clearInterval(timerIv);timerIv=null;}
function updateTimerUI(){const pct=timeLeft/TIME_MAX,bar=document.getElementById("timer-bar"),num=document.getElementById("timer-num");bar.style.width=(pct*100)+"%";num.textContent=Math.ceil(timeLeft)+"s";const cls=pct>0.5?"":pct>0.25?"warning":"danger";bar.className="timer-bar"+(cls?" "+cls:"");num.className="timer-num visible"+(cls?" "+cls:"");}
function onTimeout(){if(answered)return;answered=true;playTone("timeout");streak=0;document.getElementById("streak-val").textContent="🔥 0";const q=questions[current],key=getCfg(q).key,correct=q[key];document.querySelectorAll(".opt-btn").forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add("correct");});const fb=document.getElementById("feedback");fb.innerHTML="⏰ 时间到 · Tiempo: <strong>"+correct+"</strong><span style='font-weight:400'> ("+q.pinyin+")</span>";fb.className="feedback wrong";document.getElementById("quiz-next").className="next-btn show";addToNotebook(q);}
function addToNotebook(q){if(!wrongItems.some(w=>w.hanzi===q.hanzi)){wrongItems.push(q);sessionStorage.setItem("wItems_hsk3_v1",JSON.stringify(wrongItems));}}
function openNotebook(){const body=document.getElementById("nb-body");if(wrongItems.length===0){body.innerHTML="<div class='notebook-empty'>🎉 没有错题！<br><small>¡Sin errores todavía!</small></div>";}else{body.innerHTML=wrongItems.map(w=>"<div class='notebook-item'><div><div class='nb-hanzi'>"+w.hanzi+"</div><div class='nb-pinyin'>"+(w.pinyin||"")+"</div></div><div><div class='nb-label'>中文</div><div class='nb-zh'>"+(w.zh||w.hanzi)+"</div></div><div><div class='nb-label'>Español</div><div class='nb-es'>"+w.es+"</div></div></div>").join("");}document.getElementById("nb-count").textContent=wrongItems.length+" 个错题";document.getElementById("modal-overlay").classList.add("open");}
function closeNotebook(){document.getElementById("modal-overlay").classList.remove("open");}
function modalOutsideClick(e){if(e.target===document.getElementById("modal-overlay"))closeNotebook();}
function clearNotebook(){wrongItems=[];sessionStorage.removeItem("wItems_hsk3_v1");openNotebook();}
function spawnParticles(el,emojis){const rect=el.getBoundingClientRect();for(let i=0;i<6;i++){const p=document.createElement("div");p.className="particle";p.textContent=emojis[Math.floor(Math.random()*emojis.length)];p.style.left=(rect.left+rect.width/2+(Math.random()-0.5)*80)+"px";p.style.top=(rect.top+rect.height/2)+"px";p.style.animationDelay=(i*0.07)+"s";document.body.appendChild(p);setTimeout(()=>p.remove(),1400);}}
startGame();
