.corner{position:fixed;z-index:1;pointer-events:none;width:60px;height:60px;opacity:0.32;}
.corner-tl{top:8px;left:8px;border-top:2px solid var(--gold);border-left:2px solid var(--gold);}

.container{position:relative;z-index:2;max-width:960px;margin:0 auto;padding:0 20px 16px;}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px;border-bottom:1px solid rgba(42,148,144,0.35);margin-bottom:10px;position:relative;}
header::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-light),transparent);}
.h-title{font-family:'Noto Serif SC',serif;font-size:1.5rem;font-weight:900;color:var(--ink);letter-spacing:2px;}
.h-title span{color:var(--gold);}
.h-logo img{height:46px;}
.stats-bar{display:flex;align-items:center;background:rgba(255,255,255,0.55);border:1px solid rgba(42,148,144,0.28);border-radius:50px;padding:0 16px;height:52px;margin-bottom:10px;backdrop-filter:blur(8px);}
.stat-item{display:flex;flex-direction:column;align-items:center;padding:0 8px;}
.stat-label{font-size:0.46rem;letter-spacing:1.5px;color:var(--subtext);text-transform:uppercase;white-space:nowrap;}
.stat-value{font-size:1.05rem;font-weight:700;color:var(--ink);line-height:1.2;white-space:nowrap;}
.stat-value.gold{color:var(--gold);}.stat-value.green{color:var(--correct);}.stat-value.red{color:var(--wrong);}
.stat-divider{width:1px;height:26px;background:rgba(42,148,144,0.22);flex-shrink:0;}
.stat-spacer{flex:1;}
.icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(42,148,144,0.3);background:rgba(255,255,255,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;transition:all 0.18s;flex-shrink:0;margin-left:6px;}
.icon-btn:hover{border-color:var(--gold);background:rgba(255,255,255,0.75);}
.icon-btn.active{background:var(--gold);border-color:var(--gold);}
.nota-label{font-size:0.42rem;letter-spacing:1.5px;color:var(--subtext);text-transform:uppercase;text-align:center;margin-top:1px;white-space:nowrap;}
.progress-wrap{height:3px;background:rgba(42,148,144,0.18);border-radius:3px;margin-bottom:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:3px;transition:width 0.4s ease;}
.quiz-layout{display:flex;flex-direction:column;gap:8px;}
/* GROUP TAG */
.group-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(42,148,144,0.1);border:1px solid rgba(42,148,144,0.28);border-radius:50px;padding:4px 14px;margin-bottom:10px;}
.group-tag .w{font-family:'Noto Serif SC',serif;font-size:0.95rem;font-weight:700;color:var(--gold);}
.group-tag .vs{font-size:0.62rem;color:var(--subtext);}
/* QUESTION CARD */
.question-card{background:var(--card);border:1px solid var(--card-border);border-radius:14px;height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(12px);text-align:center;position:relative;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,0.06);flex-shrink:0;padding:14px 32px;}
.question-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.q-sent{font-family:'Noto Serif SC',serif;font-size:1.3rem;font-weight:700;color:var(--ink);line-height:1.8;letter-spacing:1px;}
.q-blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--gold);vertical-align:bottom;margin:0 2px;}
/* FEEDBACK */
.feedback-bar{height:40px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:0.78rem;padding:0 12px;border-radius:10px;flex-shrink:0;border:1px solid transparent;background:transparent;transition:background 0.2s,border-color 0.2s,color 0.2s;}
.feedback-bar.correct-fb{background:rgba(45,106,45,0.1);color:var(--correct);border-color:rgba(45,106,45,0.2);}
.feedback-bar.wrong-fb{background:rgba(139,32,32,0.07);color:var(--wrong);border-color:rgba(139,32,32,0.15);}
/* EXPLANATION */
.exp-box{height:44px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.4);border:1px solid transparent;border-radius:10px;padding:0 14px;flex-shrink:0;transition:all 0.3s;}
.exp-box.visible{border-color:rgba(42,148,144,0.25);background:rgba(255,248,220,0.65);}
.exp-text{font-size:0.74rem;color:var(--ink-mid);text-align:center;line-height:1.4;}
/* OPTIONS — 3 buttons */
.options-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;flex-shrink:0;}
.option-btn{height:58px;border-radius:11px;border:1.5px solid rgba(42,148,144,0.22);background:rgba(255,255,255,0.52);color:var(--ink);font-family:'Noto Serif SC',serif;font-size:1.15rem;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.16s;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.option-btn:hover:not(:disabled){background:rgba(255,255,255,0.82);border-color:var(--gold);color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 12px rgba(42,148,144,0.14);}
.option-btn.correct{background:rgba(45,106,45,0.12);border-color:var(--correct);color:var(--correct);font-weight:700;}
.option-btn.wrong{background:rgba(139,32,32,0.08);border-color:var(--wrong);color:var(--wrong);}
.option-btn:disabled{cursor:default;transform:none !important;}
.next-btn{height:46px;border-radius:12px;border:1.5px solid var(--gold);background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#fff;font-size:0.86rem;font-weight:700;cursor:pointer;letter-spacing:2px;transition:opacity 0.2s;box-shadow:0 2px 10px rgba(42,148,144,0.22);width:100%;flex-shrink:0;opacity:0;pointer-events:none;}
.next-btn.visible{opacity:1;pointer-events:all;}
/* WRONG PANEL */
.wrong-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:99;backdrop-filter:blur(2px);}
.wrong-overlay.open{display:block;}
.wrong-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(600px,92vw);max-height:82vh;background:rgba(248,245,235,0.98);border:1px solid rgba(42,148,144,0.3);border-radius:18px;z-index:100;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.18);}
.wrong-panel.open{display:flex;flex-direction:column;}
.wp-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid rgba(42,148,144,0.2);flex-shrink:0;}
.wp-header h2{font-family:'Noto Serif SC',serif;font-size:1.05rem;color:var(--ink);}
.wp-close{background:rgba(42,148,144,0.1);border:1px solid rgba(42,148,144,0.2);border-radius:50%;width:32px;height:32px;font-size:1rem;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center;}
.wp-body{overflow-y:auto;flex:1;padding:0 20px;}
.wp-item{padding:13px 0;border-bottom:1px solid rgba(42,148,144,0.1);}
.wp-sent{font-family:'Noto Serif SC',serif;font-size:0.95rem;font-weight:700;color:var(--ink);margin-bottom:3px;}
.wp-a{font-size:0.8rem;color:var(--correct);margin-bottom:2px;}
.wp-e{font-size:0.72rem;color:var(--subtext);}
.wp-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid rgba(42,148,144,0.2);flex-shrink:0;background:rgba(248,245,235,0.95);}
.wp-count{font-size:0.8rem;color:var(--subtext);}
.wp-clear{padding:7px 18px;border-radius:50px;border:1.5px solid var(--wrong);background:transparent;color:var(--wrong);font-size:0.76rem;font-weight:700;cursor:pointer;transition:all 0.18s;}
.wp-clear:hover{background:var(--wrong);color:#fff;}
.wp-empty{color:var(--subtext);font-size:0.85rem;text-align:center;padding:30px 0;}
/* RESULTS */
.results-screen{display:none;text-align:center;padding:20px 10px;}
.results-screen.show{display:block;}
.results-card{background:rgba(255,255,255,0.62);border:1px solid rgba(42,148,144,0.28);border-radius:18px;padding:28px 22px;backdrop-filter:blur(12px);}
.results-title{font-family:'Noto Serif SC',serif;font-size:1.7rem;font-weight:900;color:var(--gold);letter-spacing:3px;margin-bottom:2px;}
.results-sub{font-size:0.56rem;letter-spacing:3px;color:var(--subtext);font-family:'Cinzel',serif;margin-bottom:12px;}
.results-score{font-size:4rem;font-weight:900;color:var(--gold);line-height:1;margin:6px 0 3px;}
.results-desc{color:var(--subtext);font-size:0.82rem;margin-bottom:14px;}
.results-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.result-stat{background:rgba(255,255,255,0.5);border:1px solid rgba(42,148,144,0.18);border-radius:10px;padding:10px;}
.result-stat .n{font-size:1.7rem;font-weight:900;}
.result-stat .l{font-size:0.52rem;letter-spacing:2px;color:var(--subtext);margin-top:1px;}
.restart-btn{padding:10px 26px;border-radius:50px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#fff;font-size:0.84rem;font-weight:700;cursor:pointer;letter-spacing:2px;margin:0 4px;transition:all 0.2s;box-shadow:0 2px 10px rgba(42,148,144,0.25);}
.restart-btn:hover{opacity:0.9;transform:translateY(-2px);}
.f-divider{width:1px;height:28px;background:rgba(42,148,144,0.18);}
@keyframes pop{0%{transform:scale(0.96);opacity:0}100%{transform:scale(1);opacity:1}}
  .volver-btn{font-size:0.78rem;color:rgba(13,53,53,0.65);text-decoration:none;padding:4px 10px;border:1px solid rgba(13,53,53,0.2);border-radius:20px;background:rgba(255,255,255,0.5);white-space:nowrap;}
  .volver-btn:hover{background:rgba(255,255,255,0.85);color:#0d3535;}
@media (max-width:767px){
  .header-title{font-size:1.1rem;letter-spacing:1px;}
  .volver-text{display:none;}
  header>a{padding:0.35rem 0.5rem!important;}
  .stats-bar{height:auto;flex-wrap:wrap;padding:8px 10px;gap:6px 0;border-radius:14px;justify-content:space-around;}
  .stat-spacer{width:100%;height:0;flex:none;display:block;}
  .stat-divider{display:none;}
  .option-btn{height:auto;min-height:58px;padding:8px;}
  .volver-btn{white-space:nowrap;flex-shrink:0;margin-right:8px;}
  .mode-bar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:0.6rem;}
  .mode-bar::-webkit-scrollbar{display:none;}
  .mode-btn{white-space:nowrap;flex-shrink:0;}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="corner corner-tl"></div><div class="corner corner-tr"></div>
<div class="corner corner-bl"></div><div class="corner corner-br"></div>
<div class="wrong-overlay" id="wrong-overlay" onclick="closeWP()"></div>
<div class="wrong-panel" id="wrong-panel">
  <div class="wp-header">
    <h2>📖 错题本 · Cuaderno de errores</h2>
    <button class="wp-close" onclick="closeWP()">✕</button>
  </div>
  <div class="wp-body" id="wp-body"></div>
  <div class="wp-footer">
    <span class="wp-count" id="wp-count">0 个错题</span>
    <button class="wp-clear" onclick="clearWP()">清空 Borrar</button>
  </div>
</div>
<div class="container">
  <header>
    <a href="GCC_HSK6_index.html" class="volver-btn">← <span class="volver-text">Volver</span></a>
    <div class="h-title">HSK6 <span>近义词辨析</span></div>
    <div class="h-logo"><img src="../chunchun-logo.png" alt="Chunchun Guo"></div>
  </header>
  <div class="stats-bar">
    <div class="stat-item"><span class="stat-label">PUNTOS</span><span class="stat-value gold" id="score">0</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-label">RACHA</span><span class="stat-value gold" id="streak">🔥 0</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-label">PREG.</span><span class="stat-value" id="qcount">1/20</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-label">TIEMPO</span><span class="stat-value gold" id="timer">00:00</span></div>
    <div class="stat-spacer"></div>
    <div class="stat-item"><span class="stat-label">CORRECTAS</span><span class="stat-value green" id="correct-count">0</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-label">ERRORES</span><span class="stat-value red" id="wrong-count">0</span></div>
    <div style="width:6px;flex-shrink:0;"></div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <button class="icon-btn active" id="sound-btn" onclick="toggleSound()">🔊</button>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <button class="icon-btn" id="wp-btn" onclick="openWP()">📖</button>
      <span class="nota-label">NOTA</span>
    </div>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div id="quiz-area">
    <div class="quiz-layout">
      <div id="group-tag" class="group-tag"></div>
      <div class="question-card" id="question-card">
        <div class="q-sent" id="q-sent"></div>
      </div>
      <div class="feedback-bar" id="feedback"></div>
      <div class="exp-box" id="exp-box"><span class="exp-text" id="exp-text"></span></div>
      <div class="options-grid" id="options-grid">
        <button class="option-btn" disabled></button>
        <button class="option-btn" disabled></button>
        <button class="option-btn" disabled></button>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextQ()">下一题 · SIGUIENTE →</button>
    </div>
  </div>
  <div class="results-screen" id="results-screen">
    <div class="results-card">
      <div class="results-title">辨析完成</div>
      <div class="results-sub">COMPLETADO · HSK6近义词辨析</div>
      <div class="results-score" id="final-score">0</div>
      <div class="results-desc" id="final-desc"></div>
      <div class="results-grid">
        <div class="result-stat"><div class="n" style="color:var(--correct)" id="r-correct">0</div><div class="l">CORRECTAS</div></div>
        <div class="result-stat"><div class="n" style="color:var(--wrong)" id="r-wrong">0</div><div class="l">ERRORES</div></div>
        <div class="result-stat"><div class="n" style="color:var(--gold)" id="r-pct">0%</div><div class="l">ACIERTOS</div></div>
        <div class="result-stat"><div class="n" style="color:var(--ink)" id="r-time">0:00</div><div class="l">TIEMPO</div></div>
      </div>
      <button class="restart-btn" onclick="startGame()">再来一次 · REPETIR</button>
    </div>
  </div>
  
</div>
<script>
const TOTAL=20;
const questions = [{"group": ["抑制", "遏制", "压制"], "sent": "政府采取了一系列措施，______通货膨胀的进一步上涨。", "ans": "遏制", "exp": "遏制=阻止某种势头（多用于负面的扩张趋势）；抑制=压住、控制（偏医学/心理）；压制=强行压下（含强迫意味）"}, {"group": ["倡导", "提倡", "鼓励"], "sent": "学校______学生积极参与社区志愿服务活动。", "ans": "鼓励", "exp": "鼓励=给予动力支持（针对具体对象）；提倡=号召大家做（范围广）；倡导=带头推广（更正式，多用于理念）"}, {"group": ["揭露", "揭发", "披露"], "sent": "记者经过深入调查，______了这家企业长期排放污水的丑闻。", "ans": "揭露", "exp": "揭露=公开隐藏的丑恶事实；揭发=检举他人的罪行（有举报意味）；披露=公开信息（较中性）"}, {"group": ["维持", "维护", "保持"], "sent": "双方同意通过对话______良好的外交关系。", "ans": "维护", "exp": "维护=保护使不受损害；维持=使继续存在（强调延续）；保持=使状态不变（更日常）"}, {"group": ["传播", "扩散", "蔓延"], "sent": "这种思想迅速在年轻人中______，影响越来越广泛。", "ans": "传播", "exp": "传播=信息/文化的传递扩散（中性）；扩散=向四周散开（物理/负面）；蔓延=像植物一样扩展（多用于负面）"}, {"group": ["约束", "限制", "制约"], "sent": "法律对人们的行为有一定的______作用。", "ans": "约束", "exp": "约束=规范行为使不越轨；限制=设定范围不得超越；制约=相互影响形成限制"}, {"group": ["振兴", "复兴", "兴旺"], "sent": "改革开放以来，农村经济逐渐走向______。", "ans": "兴旺", "exp": "兴旺=繁荣发展（描述状态）；振兴=使衰落的重新强大（动词）；复兴=使已失去的再次兴盛"}, {"group": ["承受", "忍受", "接受"], "sent": "他默默地______着失去亲人的痛苦，没有向任何人倾诉。", "ans": "承受", "exp": "承受=被动地担负压力或痛苦；忍受=强忍着不舒适（强调克制）；接受=主动认可或收下"}, {"group": ["防止", "避免", "防范"], "sent": "为______金融风险，监管部门加强了日常检查。", "ans": "防范", "exp": "防范=提前戒备以防不测（长期警惕）；防止=采取措施不让坏事发生；避免=绕开不好的结果"}, {"group": ["激烈", "激进", "强烈"], "sent": "他对这项政策持______反对意见，多次公开发声。", "ans": "强烈", "exp": "强烈=程度深、力度大（修饰情感/意见）；激烈=过程剧烈（修饰竞争/争论）；激进=态度极端冒进"}, {"group": ["蓬勃", "旺盛", "繁荣"], "sent": "近年来，电商行业呈现出______发展的良好态势。", "ans": "蓬勃", "exp": "蓬勃=生机勃勃地发展（多修饰朝气/发展）；旺盛=精力/需求充足；繁荣=经济文化兴旺（偏结果状态）"}, {"group": ["沉默", "沉寂", "寂静"], "sent": "颁奖典礼结束后，整个会场陷入了片刻的______。", "ans": "沉寂", "exp": "沉寂=一段时间内安静无声（强调过程）；寂静=环境安静（客观描述）；沉默=人主动不说话"}, {"group": ["遏制", "控制", "压制"], "sent": "舆论的______使得这家公司不得不公开道歉。", "ans": "压制", "exp": "压制=用力量强行压住（多用于声音/意见被强行压下）；控制=管理使不超范围；遏制=阻止扩张"}, {"group": ["消除", "化解", "排除"], "sent": "通过坦诚的沟通，他们之间的误会终于被______了。", "ans": "化解", "exp": "化解=使矛盾/紧张关系缓和消散；消除=彻底去掉；排除=去掉干扰或可能性"}, {"group": ["展示", "展现", "呈现"], "sent": "这部纪录片生动地______了藏族人民的日常生活。", "ans": "呈现", "exp": "呈现=以完整面貌出现在眼前（偏被动/客观）；展示=主动拿出来给人看；展现=展示出来使人感受到（偏主观）"}, {"group": ["稳固", "巩固", "稳定"], "sent": "执政党通过一系列政策______了自己的执政基础。", "ans": "巩固", "exp": "巩固=使已有的更加牢固（动词）；稳固=牢固稳当（形容词）；稳定=保持平稳不变化"}, {"group": ["匮乏", "缺乏", "欠缺"], "sent": "这个地区经济落后，教育资源极度______。", "ans": "匮乏", "exp": "匮乏=严重不足（程度最重）；缺乏=不够（通用）；欠缺=略有不足（程度最轻）"}, {"group": ["激烈", "尖锐", "剧烈"], "sent": "双方在谈判桌上展开了______的争论，互不相让。", "ans": "激烈", "exp": "激烈=过程剧烈、对抗性强（修饰竞争/争论/战斗）；尖锐=观点锋利直接（修饰批评/矛盾/问题）；剧烈=幅度大、强度高（修饰运动/变化/疼痛）"}, {"group": ["侵犯", "侵略", "干涉"], "sent": "任何国家都无权______他国的内政。", "ans": "干涉", "exp": "干涉=强行介入他人事务（多用于政治/外交）；侵犯=侵害他人权利（范围更广）；侵略=武力入侵（军事行动）"}, {"group": ["沉着", "镇定", "冷静"], "sent": "面对突如其来的危险，她______地指挥大家有序撤离。", "ans": "沉着", "exp": "沉着=遇事不慌、稳健应对（强调行动）；镇定=情绪不波动（强调内心）；冷静=理智不冲动（强调思考）"}];
let audioCtx=null,soundOn=window.innerWidth>767;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(f,d,t='sine',v=0.3){if(!soundOn)return;try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start(c.currentTime);o.stop(c.currentTime+d);}catch(e){}}
function playCorrect(){playTone(523,0.1);setTimeout(()=>playTone(659,0.1),100);setTimeout(()=>playTone(784,0.18),200);}
function playWrong(){playTone(300,0.08,'sawtooth',0.2);setTimeout(()=>playTone(250,0.12,'sawtooth',0.15),90);}
function playClick(){playTone(440,0.06,'sine',0.15);}
function toggleSound(){soundOn=!soundOn;const b=document.getElementById('sound-btn');b.textContent=soundOn?'🔊':'🔇';b.classList.toggle('active',soundOn);}
(function(){var _b=document.getElementById("sound-btn");if(_b&&!soundOn){_b.textContent="ð";_b.classList.remove("active");}})();
let timerInterval=null,elapsed=0;
function startTimer(){elapsed=0;clearInterval(timerInterval);timerInterval=setInterval(()=>{elapsed++;document.getElementById('timer').textContent=fmt(elapsed);},1000);}
function stopTimer(){clearInterval(timerInterval);}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
let wrongItems=[];
function openWP(){document.getElementById('wrong-panel').classList.add('open');document.getElementById('wrong-overlay').classList.add('open');renderWP();}
function closeWP(){document.getElementById('wrong-panel').classList.remove('open');document.getElementById('wrong-overlay').classList.remove('open');}
function clearWP(){if(!wrongItems.length)return;if(confirm('确认清空？')){wrongItems=[];renderWP();document.getElementById('wp-btn').classList.remove('active');}}
function addWrong(q){if(!wrongItems.find(x=>x.sent===q.sent)){wrongItems.push(q);document.getElementById('wp-btn').classList.add('active');}}
function renderWP(){
  document.getElementById('wp-count').textContent=wrongItems.length+' 个错题';
  const body=document.getElementById('wp-body');
  if(!wrongItems.length){body.innerHTML='<div class="wp-empty">还没有错题 · Sin errores aún 🎉</div>';return;}
  body.innerHTML=wrongItems.map(w=>`<div class="wp-item"><div class="wp-sent">${w.sent.replace('______','【'+w.ans+'】')}</div><div class="wp-a">✅ 答案：${w.ans}</div><div class="wp-e">💡 ${w.exp}</div></div>`).join('');
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let qs=[],current=0,score=0,streak=0,correctCount=0,wrongCount=0,answered=false;
function startGame(){
  qs=shuffle([...questions]);
  current=0;score=0;streak=0;correctCount=0;wrongCount=0;answered=false;
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('quiz-area').style.display='block';
  updateStats();startTimer();showQ();
}
function showQ(){
  if(current>=TOTAL){showResults();return;}
  answered=false;
  const q=qs[current];
  document.getElementById('next-btn').classList.remove('visible');
  const fb=document.getElementById('feedback');fb.className='feedback-bar';fb.innerHTML='';
  const eb=document.getElementById('exp-box');eb.className='exp-box';
  document.getElementById('exp-text').textContent='';
  document.getElementById('progress-fill').style.width=(current/TOTAL*100)+'%';
  document.getElementById('qcount').textContent=(current+1)+'/'+TOTAL;
  const card=document.getElementById('question-card');
  card.style.animation='none';void card.offsetWidth;card.style.animation='pop 0.25s ease';
  // Group tag
  const tag=document.getElementById('group-tag');
  tag.innerHTML=q.group.map((w,i)=>i<q.group.length-1?`<span class="w">${w}</span><span class="vs">vs</span>`:`<span class="w">${w}</span>`).join('');
  // Sentence with blank
  document.getElementById('q-sent').innerHTML=q.sent.replace('______','<span class="q-blank">&nbsp;&nbsp;&nbsp;&nbsp;</span>');
  // Options — use group order (don't shuffle so students can compare)
  const grid=document.getElementById('options-grid');
  grid.innerHTML='';
  q.group.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='option-btn';btn.textContent=opt;
    btn.onclick=()=>checkAnswer(opt,q);
    grid.appendChild(btn);
  });
}
function checkAnswer(chosen,q){
  if(answered)return;answered=true;playClick();
  const isCorrect=chosen===q.ans;
  document.querySelectorAll('.option-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.ans)b.classList.add('correct');
  });
  const fb=document.getElementById('feedback');
  const eb=document.getElementById('exp-box');
  if(isCorrect){
    score+=10+streak*2;streak++;correctCount++;playCorrect();
    fb.className='feedback-bar correct-fb';
    fb.innerHTML='✅ ¡Correcto! &nbsp;<strong>'+q.ans+'</strong>';
  }else{
    document.querySelectorAll('.option-btn').forEach(b=>{if(b.textContent===chosen)b.classList.add('wrong');});
    streak=0;wrongCount++;addWrong(q);playWrong();
    fb.className='feedback-bar wrong-fb';
    fb.innerHTML='❌ Respuesta correcta: &nbsp;<strong>'+q.ans+'</strong>';
  }
  eb.classList.add('visible');
  document.getElementById('exp-text').textContent='💡 '+q.exp;
  updateStats();
  document.getElementById('next-btn').classList.add('visible');
}
function nextQ(){playClick();current++;showQ();}
function updateStats(){
  document.getElementById('score').textContent=score;
  document.getElementById('streak').textContent='🔥 '+streak;
  document.getElementById('correct-count').textContent=correctCount;
  document.getElementById('wrong-count').textContent=wrongCount;
}
function showResults(){
  stopTimer();
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('progress-fill').style.width='100%';
  const pct=Math.round(correctCount/TOTAL*100);
  document.getElementById('final-score').textContent=score;
  document.getElementById('final-desc').textContent=pct+'% aciertos · '+fmt(elapsed);
  document.getElementById('r-correct').textContent=correctCount;
  document.getElementById('r-wrong').textContent=wrongCount;
  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-time').textContent=fmt(elapsed);
  document.getElementById('results-screen').classList.add('show');
}
startGame();
</script>
<script src="../common.js"></script>
</body>
</html>
