let audioCtx=null,soundOn=window.innerWidth>767;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(f,d,t='sine',v=0.3){if(!soundOn)return;try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start(c.currentTime);o.stop(c.currentTime+d);}catch(e){}}
function playCorrect(){playTone(523,0.1);setTimeout(()=>playTone(659,0.1),100);setTimeout(()=>playTone(784,0.18),200);}
function playWrong(){playTone(300,0.08,'sawtooth',0.2);setTimeout(()=>playTone(250,0.12,'sawtooth',0.15),90);}
function playClick(){playTone(440,0.06,'sine',0.15);}

(function(){var _b=document.getElementById("sound-btn");if(_b&&!soundOn){_b.textContent="ð";_b.classList.remove("active");}})();

function startTimer(){elapsedSeconds=0;clearInterval(timerInterval);timerInterval=setInterval(()=>{elapsedSeconds++;document.getElementById('timer-display').textContent=formatTime(elapsedSeconds);},1000);}
function stopTimer(){clearInterval(timerInterval);}
function formatTime(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}

function openWrongPanel(){document.getElementById('wrong-panel').classList.add('open');document.getElementById('wrong-overlay').classList.add('open');renderWrongPanel();}

function clearWrongWords(){if(wrongWords.length===0)return;if(confirm('¿Borrar todos los errores? · 确认清空错题？')){wrongWords=[];renderWrongPanel();document.getElementById('wrong-btn').classList.remove('active');}}
function addWrongWord(w){if(!wrongWords.find(x=>x[0]===w[0])){wrongWords.push(w);document.getElementById('wrong-btn').classList.add('active');}}
function renderWrongPanel(){
  document.getElementById('wp-count').textContent=wrongWords.length+' 个错题';

  if(wrongWords.length===0){body.innerHTML='<div class="wp-empty">还没有错题 · Sin errores aún 🎉</div>';return;}
  body.innerHTML=wrongWords.map(w=>`<div class="wp-item"><div><div class="wp-col-label">中文</div><div class="wp-zh-big">${w[0]}</div><div class="wp-py">${w[1]}</div></div><div><div class="wp-col-label">ESPAÑOL</div><div class="wp-es">${w[2]}</div></div></div>`).join('');
}
let questions=[],current=0,score=0,streak=0,correctCount=0,wrongCount=0,answered=false,currentMode='zh2es';
const TOTAL=vocab.length;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function setMode(m){currentMode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn-'+m).classList.add('active');startGame();}
function startGame(){questions=shuffle([...vocab]).map(w=>({word:w,direction:currentMode}));current=0;score=0;streak=0;correctCount=0;wrongCount=0;answered=false;document.getElementById('results-screen').classList.remove('show');document.getElementById('quiz-area').style.display='block';updateStats();startTimer();showQuestion();}
function getWrongOptions(correct,direction,count){const pool=shuffle(vocab.filter(v=>v!==correct));const opts=[];for(let v of pool){if(opts.length>=count)break;if(direction==='zh2es'){if(!opts.find(o=>o[2]===v[2]))opts.push(v);}else{if(!opts.find(o=>o[0]===v[0]))opts.push(v);}}return opts;}
function showQuestion(){
  if(current>=TOTAL){showResults();return;}
  answered=false;
  const{word,direction}=questions[current];
  document.getElementById('next-btn').classList.remove('visible');
  const fb=document.getElementById('feedback');fb.className='feedback-bar';fb.innerHTML='';
  document.getElementById('progress-fill').style.width=(current/TOTAL*100)+'%';
  document.getElementById('qcount').textContent=(current+1)+'/'+TOTAL;
  const card=document.getElementById('question-card');card.style.animation='none';void card.offsetWidth;card.style.animation='pop 0.25s ease';
  const qw=document.getElementById('q-word');
  if(direction==='zh2es'){qw.textContent=word[0];qw.className='question-word';}
  else{qw.textContent=word[2];qw.className='question-word spanish';}
  const wrongOpts=getWrongOptions(word,direction,5);
  const allOpts=shuffle([word,...wrongOpts]);
  const grid=document.getElementById('options-grid');grid.innerHTML='';
  allOpts.forEach(opt=>{const btn=document.createElement('button');btn.className='option-btn'+(direction==='es2zh'?' cn-opt':'');btn.textContent=direction==='zh2es'?opt[2]:opt[0];btn.onclick=()=>checkAnswer(btn,opt,word,direction);grid.appendChild(btn);});
}
function checkAnswer(btn,chosen,correct,direction){
  if(answered)return;answered=true;playClick();
  const isCorrect=chosen[0]===correct[0];
  document.querySelectorAll('.option-btn').forEach(b=>{b.disabled=true;if(direction==='zh2es'&&b.textContent===correct[2])b.classList.add('correct');if(direction==='es2zh'&&b.textContent===correct[0])b.classList.add('correct');});
  const fb=document.getElementById('feedback');
  if(isCorrect){btn.classList.add('correct');score+=10+streak*2;streak++;correctCount++;playCorrect();fb.className='feedback-bar correct-fb';fb.innerHTML='✅ ¡Correcto! &nbsp;<span class="ca">'+correct[0]+'</span> '+correct[1]+' = '+correct[2];}
  else{btn.classList.add('wrong');streak=0;wrongCount++;addWrongWord(correct);playWrong();fb.className='feedback-bar wrong-fb';fb.innerHTML='❌ Respuesta correcta: &nbsp;<span class="ca">'+correct[0]+'</span> '+correct[1]+' = '+correct[2];}
  updateStats();document.getElementById('next-btn').classList.add('visible');
}
function nextQuestion(){playClick();current++;showQuestion();}
function updateStats(){document.getElementById('score').textContent=score;document.getElementById('streak').textContent='🔥 '+streak;document.getElementById('correct-count').textContent=correctCount;document.getElementById('wrong-count').textContent=wrongCount;}
function saveResult(num,score,pct,time){try{const key='hsk6_progress';const p=JSON.parse(localStorage.getItem(key)||'{}');if(!p[num]||score>(p[num].score||0)){p[num]={score,pct,time,date:new Date().toISOString()};localStorage.setItem(key,JSON.stringify(p));}}catch(e){}}
function showResults(){
  stopTimer();document.getElementById('quiz-area').style.display='none';document.getElementById('progress-fill').style.width='100%';
  const pct=Math.round(correctCount/TOTAL*100);
  document.getElementById('final-score').textContent=score;document.getElementById('final-sub').textContent=pct+'% aciertos · '+formatTime(elapsedSeconds);
  document.getElementById('r-correct').textContent=correctCount;document.getElementById('r-wrong').textContent=wrongCount;document.getElementById('r-pct').textContent=pct+'%';document.getElementById('r-time').textContent=formatTime(elapsedSeconds);
  saveResult(QUIZ_NUM,score,pct,elapsedSeconds);
  document.getElementById('results-screen').classList.add('show');
}
function restartSameMode(){startGame();}
function switchMode(){document.getElementById('results-screen').classList.remove('show');document.getElementById('quiz-area').style.display='block';setMode(currentMode==='zh2es'?'es2zh':'zh2es');}
startGame();

</script>
<script src="../common.js"></script>
</body>
